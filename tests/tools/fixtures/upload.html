<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PinchTab Benchmark - Upload</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #file-input { margin: 12px 0; }
    #preview {
      margin-top: 16px;
      padding: 12px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>File Upload — VERIFY_UPLOAD_PAGE_50505</h1>

  <p>Select a file using the input below. The preview area shows the
  uploaded file name and size once selected.</p>

  <label for="file-input">Choose file:</label>
  <input type="file" id="file-input" />

  <div id="preview">UPLOAD_STATUS=WAITING</div>

  <script>
    (function () {
      var input = document.getElementById('file-input');
      var preview = document.getElementById('preview');
      var count = 0;

      input.addEventListener('change', function () {
        if (input.files.length > 0) {
          var file = input.files[0];
          count++;
          preview.textContent = 'UPLOAD_FILE_RECEIVED UPLOAD_FILE_SIZE=' + file.size + ' UPLOAD_COUNT=' + count;
        }
      });
    })();
  </script>
</body>
</html>
